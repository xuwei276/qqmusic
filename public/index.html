<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QQ 音乐播放台</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div class="wallpaper" aria-hidden="true"></div>
    <canvas id="visualizer" class="visualizer-field" width="1440" height="900" aria-label="音乐柱状频谱可视化"></canvas>

    <section class="weather-card" aria-label="天气">
      <div id="weatherIcon" class="weather-icon">☁</div>
      <div>
        <strong id="weatherCity">Shanghai</strong>
        <span id="weatherText">Loading weather</span>
      </div>
    </section>

    <main class="stage">
      <header class="topbar" aria-hidden="true">
        <div class="vinyl-orbit">
          <div class="vinyl-record"></div>
        </div>
        <div class="brand">
          <span>QQ Music Lab</span>
          <strong>播放台</strong>
        </div>
      </header>

      <section class="centerpiece">
        <p id="loginState" class="status-pill">使用 QQ 音乐官方页登录后播放</p>
        <h1 id="currentTrack">搜索一首歌</h1>
        <section class="lyrics-panel" aria-label="歌词">
          <p id="pinyinLyric" class="pinyin-lyric"></p>
          <p id="currentLyric" class="current-lyric">歌词会在播放时显示</p>
          <p id="nextLyric" class="next-lyric"></p>
          <div id="lyricsList" class="lyrics-list"></div>
        </section>
        <p id="playState" class="play-state">播放状态会显示在这里</p>
        <audio id="player" preload="metadata"></audio>
      </section>
    </main>

    <nav class="side-rail" aria-label="播放台栏目">
      <button id="toggleSearch" class="rail-button" type="button" aria-label="展开搜索" aria-expanded="false" data-panel="search">
        <img class="rail-icon" src="/assets/icons/search.svg" alt="" aria-hidden="true">
      </button>
      <button id="toggleHistory" class="rail-button" type="button" aria-label="展开历史" aria-expanded="false" data-panel="history">
        <img class="rail-icon" src="/assets/icons/history.svg" alt="" aria-hidden="true">
      </button>
    </nav>

    <aside id="resultsDrawer" class="results-drawer" aria-label="侧边栏目">
      <div class="drawer-head">
        <div>
          <span id="drawerKicker">Search</span>
          <strong id="drawerTitle">搜索歌曲</strong>
        </div>
        <button id="closeResults" type="button" aria-label="关闭结果">关闭</button>
      </div>

      <section id="searchPanel" class="drawer-panel is-active" aria-label="搜索">
        <form id="searchForm" class="search-form">
          <input id="keyword" name="keyword" placeholder="搜索歌曲 / 歌手 / 专辑" autocomplete="off">
          <button type="submit">搜索</button>
        </form>
        <p id="searchState" class="panel-state">待搜索</p>
        <div id="results" class="results"></div>
      </section>

      <section id="historyPanel" class="drawer-panel" aria-label="播放历史">
        <div id="historyBody" class="history-body">
          <div class="history-actions">
            <button id="playHistory" type="button">顺序播放</button>
            <button id="clearHistory" type="button">清空</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>
      </section>

      <nav class="login-actions" aria-label="登录">
        <button id="officialLogin" type="button">QQ 登录</button>
      </nav>
    </aside>

    <footer class="visualizer-status">
      <button id="togglePlayback" class="transport-button" type="button" disabled aria-label="播放">
        <img class="rail-icon transport-icon" src="/assets/icons/play.svg" alt="" aria-hidden="true" data-play-src="/assets/icons/play.svg" data-pause-src="/assets/icons/pause.svg">
      </button>
      <div
        id="trackProgress"
        class="track-progress"
        role="slider"
        tabindex="0"
        aria-label="歌曲进度"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
      >
        <span id="trackProgressFill"></span>
      </div>
      <div class="visualizer-meta">
        <span>
          <button id="chooseWallpaper" class="wallpaper-toggle" type="button">换壁纸</button>
          <button id="resetWallpaper" class="wallpaper-toggle" type="button">默认壁纸</button>
          <input id="wallpaperFile" class="wallpaper-file" type="file" accept="image/*">
          <button id="toggleFullscreen" class="utility-toggle" type="button">全屏</button>
          <button id="toggleVisualizer" class="visualizer-toggle" type="button">液态玻璃</button>
          <span id="visualizerMode">液态玻璃</span>
        </span>
        <strong>
          <span id="heroState">等待播放</span>
          <span id="trackTime">0:00 / 0:00</span>
        </strong>
      </div>
    </footer>

    <pre id="loginLog" class="sr-log" aria-live="polite"></pre>

    <script src="/app.js" type="module"></script>
  </body>
</html>
